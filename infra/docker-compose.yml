# Monorepo infra for local development
# - PostgreSQL 17.x (pinned to latest patch)
# - Keycloak (pinned to a stable major/minor tag)
#
# Notes / best practices:
# - Prefer Debian suite-qualified Postgres tags (e.g. `-bookworm`) to avoid silent base-image jumps.
#   See tags list on Docker Hub.
# - Use an init script to create separate DB/users for app vs Keycloak.

name: guildbanker

services:
  postgres:
    image: postgres:17.9
    container_name: guildbanker-postgres
    restart: unless-stopped
    environment:
      # Superuser used only for initialization.
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres

      # Optional hardening (safe defaults for local dev)
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init/01-init-multiple-dbs.sql:/docker-entrypoint-initdb.d/01-init-multiple-dbs.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - guildbanker-net

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.7
    container_name: guildbanker-keycloak
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - start-dev
      - --http-port=8080
      - --hostname-strict=false
    environment:
      # Bootstrap admin (dev only)
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin

      # DB
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak

      # Health endpoint useful for probes
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"

      # Proxy headers (harmless in local, useful when behind reverse proxy later)
      KC_PROXY_HEADERS: xforwarded
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e 'GET /health/ready HTTP/1.1
Host: localhost
Connection: close

' >&3 && cat <&3 | head -n 1 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      - guildbanker-net

volumes:
  postgres_data:

networks:
  guildbanker-net:
    driver: bridge
