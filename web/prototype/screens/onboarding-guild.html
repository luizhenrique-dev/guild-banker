<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  body{font-family:'Inter',system-ui,sans-serif;}
  .tracking-display{letter-spacing:-1.2px;}
</style>
</head>
<body class="w-[1440px] bg-white text-[#0a0b0d]">
  <header data-design-id="onb-header-a1b2c3" class="flex h-16 items-center justify-between border-b border-[#dee1e6] px-10">
    <div class="flex items-center gap-2">
      <span class="inline-flex h-8 w-8 items-center justify-center rounded-full bg-[#0052ff] text-white"><i class="fa-solid fa-shield-halved text-xs"></i></span>
      <span class="text-[17px] font-semibold">GuildBanker</span>
    </div>
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-1 rounded-[100px] bg-[#f7f7f7] p-1">
        <button type="button" data-design-id="onb-lang-pt-d4e5f6" class="rounded-[100px] bg-white px-3 py-1 text-[12px] font-semibold text-[#0a0b0d] shadow-sm">PT</button>
        <button type="button" data-design-id="onb-lang-en-g7h8i9" class="rounded-[100px] px-3 py-1 text-[12px] font-medium text-[#7c828a]">EN</button>
      </div>
      <div class="flex items-center gap-2">
        <span class="inline-flex h-8 w-8 items-center justify-center rounded-full bg-[#eef0f3] text-[13px] font-semibold text-[#0a0b0d]">AS</span>
        <span class="text-[14px] font-medium">Ana Silva</span>
      </div>
    </div>
  </header>

  <main data-design-id="onb-main-j1k2l3" class="flex min-h-[820px] items-center justify-center bg-[#f7f7f7] px-6 py-16">
    <section data-design-id="onb-card-m4n5o6" class="w-[520px] rounded-[24px] border border-[#dee1e6] bg-white p-10 shadow-[0_4px_12px_rgba(0,0,0,0.04)]">
      <span class="inline-flex h-14 w-14 items-center justify-center rounded-full bg-[#eef0f3] text-[#0052ff]"><i class="fa-solid fa-users-line text-xl"></i></span>
      <h1 class="tracking-display mt-6 text-[34px] font-normal leading-tight">Crie sua primeira guild</h1>
      <p class="mt-2 text-[15px] leading-relaxed text-[#5b616e]">Uma guild é seu workspace familiar ou de grupo. Você poderá convidar membros e acompanhar os gastos compartilhados depois.</p>

      <form action="#" data-design-id="onb-form-p7q8r9" class="mt-8 space-y-5">
        <div>
          <label class="mb-1.5 block text-[14px] font-semibold">Nome de exibição</label>
          <input type="text" value="Família Silva" class="h-12 w-full rounded-[12px] border border-[#dee1e6] px-4 text-[15px] outline-none focus:border-[#0052ff] focus:ring-2 focus:ring-[#0052ff]/20">
          <p class="mt-1 text-[12px] text-[#7c828a]">Como sua guild aparecerá para os membros.</p>
        </div>
        <div>
          <label class="mb-1.5 block text-[14px] font-semibold">Nome da guild (slug)</label>
          <div class="flex h-12 items-center rounded-[12px] border border-[#dee1e6] px-4 focus-within:border-[#0052ff] focus-within:ring-2 focus-within:ring-[#0052ff]/20">
            <span class="text-[15px] text-[#7c828a]">guildbanker.app/</span>
            <input type="text" value="familia-silva" class="flex-1 bg-transparent text-[15px] outline-none">
          </div>
          <p class="mt-1 text-[12px] text-[#7c828a]">Identificador único, apenas letras minúsculas e hífens.</p>
        </div>
        <a href="dashboard.html" data-design-id="onb-submit-link-s1t2u3"><button type="button" data-design-id="onb-submit-btn-v4w5x6" class="mt-2 flex h-[52px] w-full items-center justify-center gap-2 rounded-[100px] bg-[#0052ff] text-[16px] font-semibold text-white transition hover:bg-[#003ecc]">Criar guild</button></a>
      </form>
    </section>
  </main>
</body>
</html>
