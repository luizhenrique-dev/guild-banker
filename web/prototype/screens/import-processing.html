<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  body{font-family:'Inter',system-ui,sans-serif;}
  .tracking-display{letter-spacing:-0.8px;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spin{animation:spin 1s linear infinite;}
  @keyframes indeterminate{0%{left:-40%}100%{left:100%}}
  .bar{animation:indeterminate 1.4s ease-in-out infinite;}
</style>
</head>
<body class="w-[1440px] bg-[#f7f7f7] text-[#0a0b0d]">
  <header data-design-id="topbar-a1b2c3" class="sticky top-0 z-20 flex h-16 items-center justify-between border-b border-[#dee1e6] bg-white px-6">
    <div class="flex items-center gap-6">
      <div class="flex items-center gap-2"><span class="inline-flex h-8 w-8 items-center justify-center rounded-full bg-[#0052ff] text-white"><i class="fa-solid fa-shield-halved text-xs"></i></span><span class="text-[17px] font-semibold">GuildBanker</span></div>
      <button type="button" data-design-id="guild-switcher-btn-d4e5f6" class="flex items-center gap-2 rounded-[100px] bg-[#eef0f3] px-3 py-1.5 text-[13px] font-semibold"><i class="fa-solid fa-users text-[#0052ff]"></i> Família Silva <i class="fa-solid fa-chevron-down text-[10px] text-[#7c828a]"></i></button>
    </div>
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-1 rounded-[100px] bg-[#f7f7f7] p-1"><button type="button" data-design-id="lang-pt-g7h8i9" class="rounded-[100px] bg-white px-3 py-1 text-[12px] font-semibold shadow-sm">PT</button><button type="button" data-design-id="lang-en-j1k2l3" class="rounded-[100px] px-3 py-1 text-[12px] font-medium text-[#7c828a]">EN</button></div>
      <span class="h-6 w-px bg-[#dee1e6]"></span>
      <div class="flex items-center gap-2"><span class="inline-flex h-8 w-8 items-center justify-center rounded-full bg-[#0052ff] text-[13px] font-semibold text-white">AS</span><div class="leading-tight"><div class="text-[13px] font-semibold">Ana Silva</div><div class="text-[11px] text-[#7c828a]">ana@familia.com</div></div></div>
      <a href="login.html" data-design-id="logout-link-m4n5o6" class="inline-flex h-9 w-9 items-center justify-center rounded-full text-[#7c828a] hover:bg-[#f7f7f7]" title="Sair"><i class="fa-solid fa-arrow-right-from-bracket"></i></a>
    </div>
  </header>

  <div class="flex">
    <aside data-design-id="sidebar-p7q8r9" class="sticky top-16 h-[calc(900px-64px)] w-60 shrink-0 border-r border-[#dee1e6] bg-white px-3 py-6">
      <nav data-design-id="sidebar-nav-s1t2u3" class="space-y-1">
        <a href="dashboard.html" class="flex items-center gap-3 rounded-[12px] px-3 py-2.5 text-[14px] font-medium text-[#5b616e] hover:bg-[#f7f7f7]"><i class="fa-solid fa-house w-5 text-center"></i> Início</a>
        <a href="transactions.html" class="flex items-center gap-3 rounded-[12px] px-3 py-2.5 text-[14px] font-medium text-[#5b616e] hover:bg-[#f7f7f7]"><i class="fa-solid fa-arrow-right-arrow-left w-5 text-center"></i> Transações</a>
        <a href="fixed-expenses.html" class="flex items-center gap-3 rounded-[12px] px-3 py-2.5 text-[14px] font-medium text-[#5b616e] hover:bg-[#f7f7f7]"><i class="fa-solid fa-repeat w-5 text-center"></i> Despesas fixas</a>
        <a href="import-upload.html" class="flex items-center gap-3 rounded-[12px] bg-[#eef0f3] px-3 py-2.5 text-[14px] font-semibold text-[#0a0b0d]"><i class="fa-solid fa-file-arrow-up w-5 text-center text-[#0052ff]"></i> Importar</a>
        <a href="guild-members.html" class="flex items-center gap-3 rounded-[12px] px-3 py-2.5 text-[14px] font-medium text-[#5b616e] hover:bg-[#f7f7f7]"><i class="fa-solid fa-user-group w-5 text-center"></i> Guild / Membros</a>
      </nav>
    </aside>

    <main data-design-id="imp-main-v4w5x6" class="flex-1 px-8 py-8">
      <div class="mb-8 flex items-center gap-2 text-[13px]">
        <span class="flex items-center gap-2 text-[#05b169]"><span class="inline-flex h-6 w-6 items-center justify-center rounded-full bg-[#05b169] text-[12px] text-white"><i class="fa-solid fa-check text-[10px]"></i></span> Upload</span>
        <span class="h-px w-10 bg-[#0052ff]"></span>
        <span class="flex items-center gap-2 font-semibold text-[#0052ff]"><span class="inline-flex h-6 w-6 items-center justify-center rounded-full bg-[#0052ff] text-[12px] text-white">2</span> Processando</span>
        <span class="h-px w-10 bg-[#dee1e6]"></span>
        <span class="flex items-center gap-2 text-[#7c828a]"><span class="inline-flex h-6 w-6 items-center justify-center rounded-full bg-[#eef0f3] text-[12px]">3</span> Revisão</span>
      </div>

      <section data-design-id="imp-processing-b1c2d3" class="mx-auto max-w-[560px] rounded-[24px] border border-[#dee1e6] bg-white p-12 text-center">
        <span class="mx-auto inline-flex h-16 w-16 items-center justify-center rounded-full bg-[#0052ff]/10">
          <i class="fa-solid fa-spinner spin text-2xl text-[#0052ff]"></i>
        </span>
        <h1 class="tracking-display mt-6 text-[26px] font-normal">Processando sua fatura...</h1>
        <p class="mt-2 text-[14px] text-[#5b616e]">Analisando transações · aguarde</p>

        <div class="relative mx-auto mt-8 h-2 w-full overflow-hidden rounded-full bg-[#eef0f3]">
          <span class="bar absolute top-0 h-2 w-2/5 rounded-full bg-[#0052ff]"></span>
        </div>
        <p class="mt-3 text-[13px] text-[#7c828a]">Isso pode levar alguns segundos</p>

        <div class="mt-8 flex items-center justify-center gap-2 text-[12px] text-[#7c828a]">
          <span class="flex items-center gap-1.5 rounded-[100px] bg-[#f7f7f7] px-3 py-1.5"><i class="fa-solid fa-file-lines text-[#5b616e]"></i> fatura-julho.pdf</span>
          <span class="mono text-[#7c828a]">248 KB</span>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
